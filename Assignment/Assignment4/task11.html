<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <table border="1" width="800" align="center">
      <tr>
        <th colspan="4" align="center">Registration Form</th>
      </tr>
      <tr>
        <td><strong>Student Name</strong></td>
        <td><input type="text" placeholder="First Name" /></td>
        <td><input type="text" placeholder="Middle Name" /></td>
        <td><input type="text" placeholder="Last Name" /></td>
      </tr>

      <tr>
        <td><strong>Father's Name</strong></td>
        <td><input type="text" placeholder="Enter your father's name" /></td>
        <td><strong>Mother's Name</strong></td>
        <td><input type="text" placeholder="Enter your mother's name" /></td>
      </tr>

      <tr>
        <td><strong>Date of Birth</strong></td>
        <td><input type="date" /></td>
        <td><strong>Gender</strong></td>
        <td>
          <input type="radio" name="gender" id="male" />
          <label for="male">Male</label>
          <input type="radio" name="gender" id="female" />
          <label for="female">Female</label>
          <input type="radio" name="gender" id="other" />
          <label for="other">Other</label>
        </td>
      </tr>
      <tr>
        <td><strong>Category</strong></td>
        <td>
          <input type="radio" name="category" id="gen" />
          <label for="gen">Gen</label>
          <input type="radio" name="category" id="obc" />
          <label for="obc">OBC</label>
          <input type="radio" name="category" id="scst" />
          <label for="scst">SC/ST</label>
        </td>
        <td><strong>Handicapped</strong></td>
        <td>
          <input type="radio" name="handicapped" id="yes" />
          <label for="yes">Yes</label>
          <input type="radio" name="handicapped" id="no" />
          <label for="no">No</label>
        </td>
      </tr>

      <tr>
        <td><strong>Ex-Serviceman</strong></td>
        <td>
          <input type="radio" name="ex" id="ex" /> <label for="ex">Yes</label>
          <input type="radio" name="ex" id="ex" /> <label for="ex">No</label>
        </td>
        <td><strong>EWS</strong></td>
        <td>
          <input type="radio" name="ews" id="ews" />
          <label for="ews">Yes</label>
          <input type="radio" name="ews" id="ews" /> <label for="ews">No</label>
        </td>
      </tr>

      <tr>
        <td><strong>State</strong></td>
        <td>
          <select>
            <option>Select any One</option>
          </select>
        </td>
        <td><strong>City</strong></td>
        <td>
          <select>
            <option>Select any One</option>
          </select>
        </td>
      </tr>

      <tr>
        <td><strong>Upload Photo</strong></td>
        <td><input type="file" /></td>
        <td><strong>Upload Signature</strong></td>
        <td><input type="file" /></td>
      </tr>
      <tr>
        <td colspan="4" style="text-align: center">
          <input type="submit" value="Submit" />
        </td>
      </tr>
    </table>
    <a href="./index.html">Back to previous Page</a>
    <br />
    <br /><a href="../HTMLAssignmentWebsite/index.html">Go to Main Website</a>
  </body>
</html>
