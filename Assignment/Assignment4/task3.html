<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <forms>
      <h3>Registration Form</h3>
      <label><b>First Name:</b></label>
      <input type="text" id="First Name" value="Enter First Name" /><br />
      <label><b>Last Name:</b></label>
      <input type="text" id="Last Name" value="Enter Last Name" /><br />
      <label><b>Email:</b></label>
      <input type="email" id="Email" value="Enter Email" /><br />
      <label><b>Password:</b></label>
      <input type="password" id="Password" name="password" /><br />
      <label><b>Gender:</b></label
      ><br />
      <label
        >Male <input type="radio" id="Male" name="gender" value="male"
      /></label>
      <br />
      <label
        >Female <input type="radio" id="Female" name="gender" value="female"
      /></label>
      <br />
      <label
        >Other <input type="radio" id="Other" name="gender" value="other"
      /></label>
      <br />
      <label><b>Age:</b></label>
      <select id="Age" name="age">
        <option value="under18">Under 18</option>
        <option value="18-24">18-24</option>
        <option value="25-34">25-34</option>
        <option value="35-44">35-44</option>
        <option value="45+">45+</option>
      </select>
      <br />
      <label><b>Preferences:</b></label>
      <br />
      <label
        >Acrylic Paintings
        <input type="checkbox" id="acrylic" name="acrylic" value="acrylic"
      /></label>
      <br />
      <label
        >oil<input type="checkbox" id="oil" name="oil" value="oil"
      /></label>
      <br />
      <label
        >Watercolor<input
          type="checkbox"
          id="watercolor"
          name="watercolor"
          value="watercolor"
      /></label>

      <br />
      <label><b>Select Occupation:</b></label>
      <select id="Occupation" name="occupation">
        <option value="student">Student</option>
        <option value="employed">Employed</option>
        <option value="self-employed">Self-employed</option>
        <option value="unemployed">Unemployed</option>
        <option value="other">Other</option>
      </select>
      <br />
      <label><b>Bio</b></label>
      <textarea id="Comments" name="comments" rows="4" cols="50">
Share your thoughts or feedback here...
      </textarea>
      <br />
      <input type="RESET" value="Reset" />
      <input type="submit" value="Submit" />
    </forms>
    <a href="./index.html">Back to previous Page</a>
    <br />
    <br /><a href="../HTMLAssignmentWebsite/index.html">Go to Main Website</a>
  </body>
</html>
