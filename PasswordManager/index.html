<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-dark text-light">
    <header class="bg-primary text-light p-3 text-center">
      <h1>Password Manager</h1>

      <div class="d-flex justify-content-center">
        <a href="" class="text-decoration-none text-white fs-5">Add new Password</a>
        <a href="" class="text-decoration-none text-white fs-5">View Saved Password</a>
      </div>
    </header>

    <main>
      <div class="w-50 mx-auto rounded border p-3 mt-4">
        <form class="d-grid gap-3 " id="passFrom">

          <input
            type="text"
            name="siteName"
            id="siteName"
            placeholder="Enter the website Name"
            class="form-control"
          />

          <input
            type="text"
            name="username"
            id="username"
            placeholder="Enter the username"
            class="form-control"
          />

          <input
            type="text"
            name="password"
            id="password"
            placeholder="Enter the password"
            class="form-control"
          />

          <div class="flex gap-3 justify-content-center">
            <button type="submit" class="btn btn-outline-primary">Save</button>
            <button type="reset" class="btn btn-outline-danger">Cancel</button
          </div>
        </form>
      </div>
    </main>

    <!-- Bootstrap Script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-eUw+L7D4l09f5c9pF2b1vKZv6zDxJjGd1hQ7aR0HgMz6OqF2qP1e9dV0s"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
