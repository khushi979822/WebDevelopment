<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Calculator</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="main">
      <div class="title">TIP CALCULATOR</div>
      <br />

      <div class="box">
        <label>Bill Amount</label>
        <input type="number" id="billAmount" placeholder="Enter Bill Amount" />

        <label>How was the service ?</label>

        <select id="service">
          <option value="Select">Select</option>
          <option value="0.25">25% - Top Notch</option>
          <option value="0.20">20% - Excellent</option>
          <option value="0.15">15% - Good</option>
          <option value="0.10">10% - Bad</option>
          <option value="0.05">5% - Worst</option>
        </select>

        <label>Total number of persons</label>

        <input
          type="number"
          id="persons"
          placeholder="Number of people sharing the bill"
        />

        <button onclick="calculateTip()">Calculate</button>

        <div class="result">Tip Amount : ₹<span id="tip">XX</span></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
