<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Guess The Number</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="bg-dark p-3 mb-5"></div>

    <div class="container rounded shadow-lg border border-1">
      <h1 class="fw-bold mb-4 p-1">Guess The Number</h1>

      <p class="fs-4">
        We have selected a random number between 1 - 10. See if you can guess
        it.
      </p>

      <form id="guessForm" class="d-flex align-items-center gap-3 mt-4">
        <label class="fs-4"> Enter a guess: </label>

        <input
          type="number"
          id="guessNumber"
          min="1"
          max="10"
          class="form-control w-25"
        />

        <button type="submit" class="btn btn-secondary border">
          Submit guess
        </button>
      </form>

      <div id="result" class="fw-bold fs-4 mt-4"></div>

      <hr class="border border-dark border-1 mt-lg-2" />
    </div>

    <script src="script.js"></script>
  </body>
</html>
