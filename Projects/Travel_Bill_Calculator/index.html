<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Travel Bill Calculator</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div class="card shadow-lg border-0">
            <div class="card-header bg-primary text-white text-center">
              <h2>🚇 Travel Bill Calculator</h2>
            </div>

            <div class="card-body">
              <div class="mb-3">
                <label class="form-label fw-bold">
                  Enter Kilometers Covered
                </label>

                <input
                  type="number"
                  id="km"
                  class="form-control"
                  placeholder="Enter distance"
                  step="0.1"
                />

                <div id="error" class="text-danger mt-2"></div>
              </div>

              <button class="btn btn-success w-100" onclick="calculateBill()">
                Calculate Bill
              </button>
            </div>
          </div>

          <div class="card mt-4 shadow border-0" id="resultCard">
            <div class="card-header bg-dark text-white">
              <h4>Bill Details</h4>
            </div>

            <div class="card-body">
              <p id="slab1"></p>

              <p id="slab2"></p>

              <p id="slab3"></p>

              <hr />

              <h4 id="total" class="text-success fw-bold"></h4>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
