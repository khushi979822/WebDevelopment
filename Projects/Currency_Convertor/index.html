<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="text-center p-2 fw-bold ">
      <h1>🤑 Currency Converter 🪙💵</h1>
    </header>

    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-7">
          <div class="card converter-card p-4">
            <div class="row">
              <div class="col-md-5 text-center">
                <img id="flag1" src="https://flagsapi.com/IN/flat/64.png" />

                <select class="form-select mt-3" id="fromCurrency">
                  <option value="inr">INDIA (INR)</option>
                  <option value="usd">USA (USD)</option>
                  <option value="eur">EURO (EUR)</option>
                  <option value="gbp">UK (GBP)</option>
                </select>
              </div>

              <div
                class="col-md-2 d-flex justify-content-center align-items-center"
              >
                <button
                  class="btn btn-dark rounded-circle"
                  onclick="swapCurrency()"
                >
                  ⇄
                </button>
              </div>

              <div class="col-md-5 text-center">
                <img id="flag2" src="https://flagsapi.com/US/flat/64.png" />

                <select class="form-select mt-3" id="toCurrency">
                  <option value="usd">USA (USD)</option>
                  <option value="inr">INDIA (INR)</option>
                  <option value="eur">EURO (EUR)</option>
                  <option value="gbp">UK (GBP)</option>
                </select>
              </div>
            </div>

            <input
              type="number"
              class="form-control mt-4"
              placeholder="Enter Amount"
              id="amount"
            />

            <button class="btn btn-primary mt-4" onclick="convertCurrency()">
              Convert
            </button>

            <h3 class="text-center mt-4" id="result">Converted Amount : 0</h3>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
