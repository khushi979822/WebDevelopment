<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Salary Calculator</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-success-subtle">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div class="card shadow border border-2">
            <div class="card-header bg-primary text-white text-center">
              <h2>🤑 Salary Calculator</h2>
            </div>

            <div class="card-body">
              <div class="mb-3">
                <label class="form-label fw-bold"> Enter Basic Salary </label>

                <input
                  type="number"
                  id="basicSalary"
                  class="form-control"
                  placeholder="Enter Basic Salary"
                />

                <div id="error" class="text-danger mt-2"></div>
              </div>

              <div class="d-flex gap-3">
                <button
                  id="calculateBtn"
                  class="btn btn-success w-100"
                  onclick="startCalculation()"
                >
                  Calculate Gross Salary
                </button>

                <button class="btn btn-danger w-100" onclick="resetForm()">
                  Reset
                </button>
              </div>

              <div id="success" class="alert alert-success mt-3 d-none">
                Salary Calculated Successfully!
              </div>
            </div>
          </div>

          <div id="resultCard" class="card shadow mt-4 d-none">
            <div class="card-header bg-dark text-white">
              <h4>Salary Details</h4>
            </div>

            <div class="card-body">
              <p id="basic"></p>

              <p id="hra"></p>

              <p id="da"></p>

              <hr />

              <h4 id="gross" class="text-success fw-bold"></h4>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
