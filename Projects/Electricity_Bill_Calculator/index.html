<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Electricity Bill Calculator</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div class="card shadow-lg border-0">
            <div class="card-header text-center bg-primary text-white">
              <h2>⚡Electricity Bill Calculator</h2>
            </div>

            <div class="card-body">
              <div class="mb-3">
                <label class="form-label fw-bold">
                  Enter Electricity Units
                </label>

                <input
                  type="number"
                  id="units"
                  class="form-control"
                  placeholder="Enter units"
                />
              </div>

              <div class="d-flex gap-3">
                <button class="btn btn-success w-100" onclick="calculateBill()">
                  Calculate
                </button>

                <button class="btn btn-danger w-100" onclick="resetBill()">
                  Reset
                </button>
              </div>
            </div>
          </div>

          <div class="card mt-4 shadow border-0" id="billCard">
            <div class="card-header bg-dark text-white">
              <h4>Bill Details</h4>
            </div>

            <div class="card-body">
              <p id="slab1"></p>
              <p id="slab2"></p>
              <p id="slab3"></p>
              <p id="slab4"></p>

              <hr />

              <p id="subtotal" class="fw-bold"></p>

              <p id="surcharge" class="fw-bold"></p>

              <h4 id="total" class="text-success"></h4>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
