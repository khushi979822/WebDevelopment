<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Calculator</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="w-25 bg-light rounded shadow border mx-auto mt-5">
      <h1 class="text-center mb-3">Age calculator</h1>
      <form class="d-flex flex-column gap-3 align-items-center w-100 p-3">
        <label for="DOB">Enter Your Date Of Birth</label>
        <input type="date" name="DOB" id="DOB" class="form-control" />
        <label for="CurrentDate">Choose Current Date</label>
        <input
          type="date"
          name="CurrentDate"
          id="CurrentDate"
          class="form-control"
        />
        <button type="submit" class="btn btn-primary">Calculate Age</button>
      </form>
      <div class="fw-bold text-center">
        Your Age is : <span id="MyAge">XX</span> Years
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-eUw+L7D4l09f5c9pF2b1vKZv6zDxJjGd1hQ7aR0HgMz6OqF2qP1e9dV0s"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
